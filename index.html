<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Transparent PNG Studio</title>
  <meta name="description" content="高度な色空間処理と勾配検知アルゴリズムを用いた、プロ仕様の半透明PNG作成ツール。ブラウザ完結でプライバシーも安心。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .main-container {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
    }

    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .control-group {
      margin-bottom: 24px;
    }

    .control-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .slider-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .value-display {
      font-family: monospace;
      font-size: 0.9rem;
      width: 30px;
      text-align: right;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    #dropZone {
      border: 2px dashed var(--glass-border);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 20px;
    }

    #dropZone.dragover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
      transform: scale(1.02);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    #processBtn {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    #processBtn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    #saveBtn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: white;
    }

    #saveBtn:not(:disabled):hover {
      background: var(--glass);
    }

    #saveBtn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .preview-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      max-width: 100%;
      background: repeating-conic-gradient(#1e293b 0% 25%, #0f172a 0% 50%) 0% 0% / 20px 20px;
      cursor: crosshair;
    }

    #maskCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: none;
      display: none;
      z-index: 5;
    }

    .canvas-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .color-select {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    #colorBox {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    footer {
      margin-top: auto;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>Transparent PNG Studio</h1>
  <p class="subtitle">プレミアムな半透明素材を、驚くほど簡単に。</p>

  <div class="main-container">
    <!-- Controls Panel -->
    <div class="glass-panel">
      <div id="dropZone">
        <p style="font-size: 0.9rem; margin: 0; color: var(--text-muted);">
          ドラッグ＆ドロップ、または
        </p>
        <input type="file" id="fileInput" accept="image/*" style="margin-top: 12px; width: 100%; cursor: pointer;">
      </div>

      <div class="color-select">
        <div id="colorBox" style="background-color: #ffffff;"></div>
        <div style="font-size: 0.85rem;">
          <strong>透明にする色</strong><br>
          <span style="color: var(--text-muted);">画像をクリックして選択</span>
        </div>
      </div>

      <div class="control-group">
        <label>色の許容範囲 (Intensity)</label>
        <div class="slider-box">
          <input type="range" id="intensity" min="0" max="255" value="60">
          <span class="value-display" id="intensityValue">60</span>
        </div>
      </div>

      <div class="control-group">
        <label>透過の強さ (Strength)</label>
        <div class="slider-box">
          <input type="range" id="strength" min="0" max="255" value="200">
          <span class="value-display" id="strengthValue">200</span>
        </div>
      </div>

      <div class="control-group">
        <label class="checkbox-container">
          <input type="checkbox" id="fullTransparentMode" checked>
          背景をAI検知して完全透過する
        </label>

        <label class="checkbox-container">
          <input type="checkbox" id="showMask">
          背景の判定エリアを可視化する (Mask Overlay)
        </label>

        <div id="bgThresholdControl">
          <div style="margin-bottom: 12px;">
            <label>背景の一致度 (BG Threshold)</label>
            <div class="slider-box">
              <input type="range" id="bgThreshold" min="5" max="100" value="30">
              <span class="value-display" id="bgThresholdValue">30</span>
            </div>
          </div>
          <div style="margin-bottom: 12px;">
            <label>境界の判定範囲 (Edge Detection Range)</label>
            <div class="slider-box">
              <input type="range" id="edgeRadius" min="1" max="5" value="1">
              <span class="value-display" id="edgeRadiusValue">1</span>
            </div>
          </div>
          <div>
            <label>境界の敏感度 (Gradient Sensitivity)</label>
            <div class="slider-box">
              <input type="range" id="gradThreshold" min="1" max="100" value="70">
              <span class="value-display" id="gradThresholdValue">70</span>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">
              値を上げるほど、境界のわずかな変化を敏感に捉えて保護（停止）します。
            </p>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>境界の滑らかさ (Smoothing Size)</label>
        <div class="slider-box">
          <input type="range" id="smoothRadius" min="0" max="4" value="1">
          <span class="value-display" id="smoothRadiusValue">1</span>
        </div>
      </div>

      <button id="processBtn" class="btn">変換を実行</button>
      <button id="saveBtn" class="btn" disabled>画像を書き出す</button>
    </div>

    <!-- Preview Area -->
    <div class="preview-area">
      <div class="canvas-wrapper">
        <span class="canvas-label">Original</span>
        <canvas id="originalCanvas" width="400" height="300"></canvas>
      </div>
      <div class="canvas-wrapper">
        <span class="canvas-label">Result</span>
        <canvas id="resultCanvas" width="400" height="300"></canvas>
        <canvas id="maskCanvas" width="400" height="300"></canvas>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2025 Transparent PNG Studio. Developed with advanced color algorithms.
  </footer>

  <script src="transpng.js"></script>
</body>

</html>
